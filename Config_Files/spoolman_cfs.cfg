#####################################################################
# CFS + Spoolman Integration for K1 Max (Direct-Drive Version)
#####################################################################

[gcode_macro _CFS_SPOOL_VARS]
description: Storage for Spoolman IDs assigned to CFS slots
variable_slot0_id: 0
variable_slot1_id: 0
variable_slot2_id: 0
variable_slot3_id: 0
gcode:
    # No execution needed

[gcode_macro MAP_ALL_SPOOLS]
description: UI Pop-up to map all 4 CFS slots to Spoolman IDs
gcode:
    {% set s0 = params.SLOT0|default(0)|int %}
    {% set s1 = params.SLOT1|default(0)|int %}
    {% set s2 = params.SLOT2|default(0)|int %}
    {% set s3 = params.SLOT3|default(0)|int %}
    
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot0_id VALUE={s0}
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot1_id VALUE={s1}
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot2_id VALUE={s2}
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot3_id VALUE={s3}
    M118 CFS Mapping Updated: S0={s0}, S1={s1}, S2={s2}, S3={s3}

[gcode_macro SYNC_SPOOLMAN]
description: Updates the active spool in the Spoolman database via Moonraker API
gcode:
    {% set slot = params.SLOT|default(0)|int %}
    {% set id = 0 %}
    
    {% if slot == 0 %} {% set id = printer["gcode_macro _CFS_SPOOL_VARS"].slot0_id %}
    {% elif slot == 1 %} {% set id = printer["gcode_macro _CFS_SPOOL_VARS"].slot1_id %}
    {% elif slot == 2 %} {% set id = printer["gcode_macro _CFS_SPOOL_VARS"].slot2_id %}
    {% elif slot == 3 %} {% set id = printer["gcode_macro _CFS_SPOOL_VARS"].slot3_id %}
    {% endif %}

    {% if id > 0 %}
        {action_call_remote_method("spoolman_set_active_spool", spool_id=id)}
        M118 Spoolman: Active ID {id} (Slot {slot})
    {% else %}
        {action_call_remote_method("spoolman_set_active_spool", spool_id=None)}
        M118 Spoolman: Cleared (No ID for Slot {slot})
    {% endif %}

[gcode_macro STATUS_SPOOL_MAP]
description: Display current CFS to Spoolman ID assignments in console
gcode:
    M118 Current CFS-Spoolman Mapping:
    M118 Slot 0: ID {printer["gcode_macro _CFS_SPOOL_VARS"].slot0_id}
    M118 Slot 1: ID {printer["gcode_macro _CFS_SPOOL_VARS"].slot1_id}
    M118 Slot 2: ID {printer["gcode_macro _CFS_SPOOL_VARS"].slot2_id}
    M118 Slot 3: ID {printer["gcode_macro _CFS_SPOOL_VARS"].slot3_id}

[gcode_macro CLEAR_CFS_SPOOLS]
description: Reset all slot assignments to 0
gcode:
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot0_id VALUE=0
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot1_id VALUE=0
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot2_id VALUE=0
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot3_id VALUE=0
    M118 CFS Spool Mapping Cleared.
