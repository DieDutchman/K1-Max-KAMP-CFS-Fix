#####################################################################
# Spoolman & CFS Integration Logic - Fixed for Persistence
#####################################################################

[gcode_macro _CFS_SPOOL_VARS]
# UPDATE THESE IDS TO YOUR SPOOLMAN IDS TO HAVE THEM LOAD ON STARTUP
variable_slot0_id: 0 
variable_slot1_id: 0
variable_slot2_id: 0
variable_slot3_id: 0
gcode:
    # Internal macro to store IDs

[gcode_macro MAP_ALL_SPOOLS]
description: Set all 4 Spoolman IDs at once for the current session.
gcode:
    # Fetch current values so we don't overwrite with 0 if left blank in UI
    {% set cur = printer["gcode_macro _CFS_SPOOL_VARS"] %}
    
    {% set s0 = params.SLOT0|default(cur.slot0_id)|int %}
    {% set s1 = params.SLOT1|default(cur.slot1_id)|int %}
    {% set s2 = params.SLOT2|default(cur.slot2_id)|int %}
    {% set s3 = params.SLOT3|default(cur.slot3_id)|int %}

    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot0_id VALUE={s0}
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot1_id VALUE={s1}
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot2_id VALUE={s2}
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot3_id VALUE={s3}

    {action_respond_info("✅ CFS Mapping Updated: Slot 0:ID %d | Slot 1:ID %d | Slot 2:ID %d | Slot 3:ID %d" % (s0, s1, s2, s3))}

[gcode_macro SELECT_T0]
gcode:
    {% set id = printer["gcode_macro _CFS_SPOOL_VARS"].slot0_id %}
    {% if id > 0 %}
        {action_call_remote_method("spoolman_set_active_spool", spool_id=id)}
    {% else %}
        {action_call_remote_method("spoolman_set_active_spool", spool_id=None)}
    {% endif %}
    BOX_LOAD_MATERIAL_WITH_MATERIAL TNN=T1A

[gcode_macro SELECT_T1]
gcode:
    {% set id = printer["gcode_macro _CFS_SPOOL_VARS"].slot1_id %}
    {% if id > 0 %}
        {action_call_remote_method("spoolman_set_active_spool", spool_id=id)}
    {% else %}
        {action_call_remote_method("spoolman_set_active_spool", spool_id=None)}
    {% endif %}
    BOX_LOAD_MATERIAL_WITH_MATERIAL TNN=T1B

[gcode_macro SELECT_T2]
gcode:
    {% set id = printer["gcode_macro _CFS_SPOOL_VARS"].slot2_id %}
    {% if id > 0 %}
        {action_call_remote_method("spoolman_set_active_spool", spool_id=id)}
    {% else %}
        {action_call_remote_method("spoolman_set_active_spool", spool_id=None)}
    {% endif %}
    BOX_LOAD_MATERIAL_WITH_MATERIAL TNN=T2A

[gcode_macro SELECT_T3]
gcode:
    {% set id = printer["gcode_macro _CFS_SPOOL_VARS"].slot3_id %}
    {% if id > 0 %}
        {action_call_remote_method("spoolman_set_active_spool", spool_id=id)}
    {% else %}
        {action_call_remote_method("spoolman_set_active_spool", spool_id=None)}
    {% endif %}
    BOX_LOAD_MATERIAL_WITH_MATERIAL TNN=T2B

[gcode_macro STATUS_SPOOL_MAP]
description: Quick look at current CFS Slot assignments
gcode:
    {% set s = printer["gcode_macro _CFS_SPOOL_VARS"] %}
    {action_respond_info("📍 CURRENT MAPPINGS:
                          Slot 0: ID %d
                          Slot 1: ID %d
                          Slot 2: ID %d
                          Slot 3: ID %d" % (s.slot0_id, s.slot1_id, s.slot2_id, s.slot3_id))}

[gcode_macro CLEAR_CFS_SPOOLS]
description: Resets all Spoolman mappings to 0
gcode:
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot0_id VALUE=0
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot1_id VALUE=0
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot2_id VALUE=0
    SET_GCODE_VARIABLE MACRO=_CFS_SPOOL_VARS VARIABLE=slot3_id VALUE=0
    SET_ACTIVE_SPOOL ID=0

    {action_respond_info("All CFS Spoolman IDs cleared.")}

