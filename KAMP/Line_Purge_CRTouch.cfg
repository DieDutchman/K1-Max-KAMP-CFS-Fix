###########################################
# Purge Line Macros
###########################################

[gcode_macro LINE_PURGE]
description: A purge macro that adapts to be near your actual printed objects, optimized for CR-Touch
gcode:
    {% set travel_speed = (printer.toolhead.max_velocity) * 60 | float %}
    {% set cross_section = printer.configfile.settings.extruder.max_extrude_cross_section | float %}
    {% if printer.firmware_retraction is defined %}
        {% set RETRACT = 'G10' | string %}
        {% set UNRETRACT = 'G11' | string %}
    {% else %}
        {% set RETRACT = 'G1 E-0.5 F2400' | string %}
        {% set UNRETRACT = 'G1 E0.5 F2400' | string %}
    {% endif %}

    # K1 Max Bed Limits
    {% set bed_x_max = 300 | float %}
    {% set bed_y_max = 300 | float %}
    
    {% set verbose_enable = printer["gcode_macro _KAMP_Settings"].verbose_enable | abs %}
    {% set purge_height = printer["gcode_macro _KAMP_Settings"].purge_height | float %}
    {% set tip_distance = printer["gcode_macro _KAMP_Settings"].tip_distance | float %}
    {% set purge_margin = printer["gcode_macro _KAMP_Settings"].purge_margin | float %}
    {% set purge_amount = printer["gcode_macro _KAMP_Settings"].purge_amount | float %}
    {% set flow_rate = printer["gcode_macro _KAMP_Settings"].flow_rate | float %}
    {% set rapid_move = 10 %}
    
    # Calculate Object Bounds
    {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}
    {% set purge_x_min = (all_points | map(attribute=0) | min | default(0)) %}
    {% set purge_x_max = (all_points | map(attribute=0) | max | default(0)) %}
    {% set purge_y_min = (all_points | map(attribute=1) | min | default(0)) %}
    {% set purge_y_max = (all_points | map(attribute=1) | max | default(0)) %}
    {% set detect_object = purge_x_min + purge_x_max + purge_y_min + purge_y_max %}
    
    # Center the purge line relative to the object
    {% set purge_x_center = ([((purge_x_max + purge_x_min) / 2) - (purge_amount / 2), 12] | max) %}
    {% set purge_y_center = ([((purge_y_max + purge_y_min) / 2) - (purge_amount / 2), 20] | max) %}
    
    # Prevent going out of bounds on the high end
    {% if (purge_x_center + purge_amount + rapid_move) > bed_x_max %}
        {% set purge_x_center = (bed_x_max - (purge_amount + rapid_move)) %}
    {% endif %}
    {% if (purge_y_center + purge_amount + rapid_move) > bed_y_max %}
        {% set purge_y_center = (bed_y_max - (purge_amount + rapid_move)) %}
    {% endif %}

    {% set purge_y_origin_low = (purge_y_min - purge_margin) %}
    {% set purge_move_speed = (flow_rate / 5.0) * 60 | float %}

    {% if cross_section < 5 %}
        {action_respond_info("Extruder max_extrude_cross_section too low! Set to 5 in [extruder] section.")}
    {% else %}
        SAVE_GCODE_STATE NAME=Prepurge_State
        G90 # Absolute positioning
        
        {% if detect_object == 0 %}
            # FALLBACK: Safe CR-Touch position if no object found
            RESPOND TYPE=command MSG="No object detected! Purging at safe X12 Y20."
            G1 Z10 F3000
            G1 X12 Y20 F5000
            G1 Z{purge_height} F600
            G92 E0
            M83 # Relative extrusion
            G1 E{tip_distance} F{purge_move_speed}
            G1 X{12 + purge_amount} E{purge_amount} F{purge_move_speed}
            {RETRACT}
            G1 Z5 F3000
        
        {% elif purge_y_origin_low > 20 %}
            # ADAPTIVE: Purge in front of the object
            RESPOND TYPE=command MSG="KAMP: Adaptive Purge starting near object."
            G92 E0
            G1 X12 Y20 Z10 F5000 # Safety transition point
            G1 X{purge_x_center} Y{purge_y_origin_low} Z10 F5000
            G1 Z{purge_height} F600
            M83
            G1 E{tip_distance} F{purge_move_speed}
            G1 X{purge_x_center + purge_amount} E{purge_amount} F{purge_move_speed}
            {RETRACT}
            G92 E0
            M82
            G1 Z{purge_height * 2} F3000

        {% else %}
            # FALLBACK: Object is too close to the front edge, use default safe spot
            RESPOND TYPE=command MSG="Object too close to front! Purging at safe X12 Y20."
            G1 X12 Y20 Z10 F5000
            G1 Z{purge_height} F600
            G92 E0
            M83
            G1 E{tip_distance} F{purge_move_speed}
            G1 X{12 + purge_amount} E{purge_amount} F{purge_move_speed}
            {RETRACT}
            G1 Z5 F3000
        {% endif %}

        RESTORE_GCODE_STATE NAME=Prepurge_State
    {% endif %}
